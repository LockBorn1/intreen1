<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Intreen LMS — E-Learning</title>

<link rel="stylesheet" href="/assets/css/styles.css"/>
<link rel="stylesheet" href="/assets/css/gradient-theme.css"/>
<script src="/assets/js/gate.js" defer></script>

<style>
  :root{
    --ink:#0b1220; --muted:#475569; --line:rgba(0,0,0,.12);
    --card:#ffffffe6; --grad1:#007cf0; --grad2:#6a00f4;
  }
  body{margin:0;color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
  main.container{max-width:1180px}

  /* Layout */
  .shell{display:grid;grid-template-columns:240px 1fr;gap:16px;align-items:start}
  @media (max-width:1000px){.shell{grid-template-columns:1fr}}
  .sidebar{position:sticky;top:84px}
  .nav{display:grid;gap:6px}
  .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:var(--card);
    border:1px solid var(--line);text-decoration:none;color:var(--ink)}
  .nav a.active{outline:2px solid rgba(0,124,240,.25);background:#fff}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .p{padding:16px}
  h1,h2,h3{margin:0 0 8px}
  .meta{color:var(--muted)}

  /* Dashboard hero */
  .hero{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:center}
  @media (max-width:900px){.hero{grid-template-columns:1fr}}
  .ring{width:220px;height:220px;place-self:center;display:grid;place-items:center}
  .ring svg{width:220px;height:220px}
  .kpi-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
  @media (max-width:900px){.kpi-row{grid-template-columns:1fr}}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}

  /* Course grid */
  .grid{display:grid;gap:14px}
  .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
  @media (max-width:900px){.grid-3,.grid-2{grid-template-columns:1fr}}
  .thumb{aspect-ratio:16/9;border-radius:12px;background:linear-gradient(135deg,var(--grad1),var(--grad2));
    display:grid;place-items:center;color:#fff;font-weight:800}

  .progress{height:8px;background:#e5edf7;border-radius:999px;overflow:hidden}
  .fill{height:100%;background:linear-gradient(90deg,var(--grad1),var(--grad2))}
  .btn{display:inline-block;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:#f8fafc;color:var(--ink);text-decoration:none;cursor:pointer}
  .btn.grad{border:none;color:#fff;background:linear-gradient(90deg,var(--grad1),var(--grad2))}
  .btn.sm{padding:7px 10px}
  .pill{border-radius:999px;background:#eef2ff;color:#3730a3;font-size:.8rem;padding:2px 8px}

  /* Tables */
  table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
  thead th{background:#f8fafc;text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  tbody td{padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.06)}
  tbody tr:last-child td{border-bottom:none}

  /* Sheets / modals */
  .sheet{position:fixed;inset:auto 0 0 0;max-height:80vh;background:var(--card);border-top:1px solid var(--line);
    border-radius:16px 16px 0 0;box-shadow:0 -12px 40px rgba(0,0,0,.12);display:none;z-index:60}
  .sheet.open{display:block;animation:slideUp .18s ease}
  .sheet .hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line)}
  .sheet .bd{padding:16px;overflow:auto;max-height:calc(80vh - 54px)}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  /* Minimal demo player (inline sheet content) */
  .lesson{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}

  /* Subtle helpers */
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .rows{display:grid;gap:10px}
</style>
</head>
<body class="gradient-bg">
  <div id="site-navbar"></div>

  <main class="container mt-8">
    <!-- Title bar -->
    <div class="toolbar" style="justify-content:space-between;margin-bottom:10px">
      <div>
        <h1>Intreen LMS</h1>
        <p class="meta" id="welcome">A simple dashboard to learn, track progress, and view grades.</p>
      </div>
      <div class="toolbar">
        <input id="q" type="search" class="btn" style="min-width:220px" placeholder="Search courses…"/>
        <button id="search" class="btn grad">Search</button>
      </div>
    </div>

    <section class="shell">
      <!-- Sidebar -->
      <aside class="sidebar">
        <nav class="nav" aria-label="Primary">
          <a class="active" data-view="dashboard">🏠 Dashboard</a>
          <a data-view="courses">🎓 Courses</a>
          <a data-view="grades">🧮 Grades</a>
          <a data-view="certs">🏅 Certificates</a>
        </nav>
      </aside>

      <!-- Main area -->
      <div id="views">
        <!-- Dashboard -->
        <section data-view="dashboard">
          <article class="card"><div class="p hero">
            <!-- Progress Ring -->
            <div class="ring">
              <svg viewBox="0 0 120 120" role="img" aria-label="Overall progress">
                <circle cx="60" cy="60" r="52" fill="none" stroke="#e6eef6" stroke-width="12"/>
                <circle id="ring" cx="60" cy="60" r="52" fill="none" stroke-linecap="round"
                        stroke="url(#g)" stroke-width="12" stroke-dasharray="327" stroke-dashoffset="327"
                        transform="rotate(-90 60 60)"/>
                <defs>
                  <linearGradient id="g" x1="0" x2="1">
                    <stop offset="0" stop-color="#007cf0"/><stop offset="1" stop-color="#6a00f4"/>
                  </linearGradient>
                </defs>
                <text id="ringtxt" x="60" y="65" text-anchor="middle" font-size="20" font-weight="700" fill="#0b1220">0%</text>
              </svg>
            </div>

            <!-- Quick summary -->
            <div class="rows">
              <div class="kpi-row">
                <div class="kpi">
                  <div class="meta">Active Courses</div>
                  <div id="kpi-courses" style="font-weight:800;font-size:1.2rem">—</div>
                </div>
                <div class="kpi">
                  <div class="meta">Certificates</div>
                  <div id="kpi-certs" style="font-weight:800;font-size:1.2rem">—</div>
                </div>
                <div class="kpi">
                  <div class="meta">Streak</div>
                  <div id="kpi-streak" style="font-weight:800;font-size:1.2rem">—</div>
                </div>
              </div>

              <div class="grid grid-2">
                <!-- Continue -->
                <div class="card"><div class="p">
                  <div class="toolbar" style="justify-content:space-between">
                    <h3>Continue learning</h3>
                    <button class="btn sm" data-nav="courses">View all</button>
                  </div>
                  <div id="continue" class="grid grid-2" style="margin-top:8px"></div>
                </div></div>

                <!-- Upcoming -->
                <div class="card"><div class="p">
                  <div class="toolbar" style="justify-content:space-between">
                    <h3>Upcoming</h3>
                    <span class="pill">This week</span>
                  </div>
                  <div id="upcoming" class="rows" style="margin-top:8px"></div>
                </div></div>
              </div>
            </div>
          </div></article>
        </section>

        <!-- Courses -->
        <section data-view="courses" style="display:none">
          <article class="card"><div class="p">
            <div class="toolbar" style="justify-content:space-between">
              <h3>Courses</h3>
              <div class="toolbar">
                <select id="sort" class="btn sm">
                  <option value="rec">Recommended</option>
                  <option value="prog">Progress</option>
                  <option value="dur">Duration</option>
                </select>
                <button id="clear" class="btn sm">Clear</button>
              </div>
            </div>
            <div id="courses-grid" class="grid grid-3" style="margin-top:8px"></div>
          </div></article>
        </section>

        <!-- Grades -->
        <section data-view="grades" style="display:none">
          <article class="card"><div class="p">
            <h3>Grades</h3>
            <table style="margin-top:8px">
              <thead><tr><th>Course</th><th>Assessment</th><th>Score</th><th>Status</th></tr></thead>
              <tbody id="grades-tbody"></tbody>
            </table>
          </div></article>
        </section>

        <!-- Certificates -->
        <section data-view="certs" style="display:none">
          <article class="card"><div class="p">
            <h3>Certificates</h3>
            <div id="certs-list" class="rows" style="margin-top:8px"></div>
          </div></article>
        </section>
      </div>
    </section>
  </main>

  <!-- Course sheet -->
  <section class="sheet" id="sheet-course" aria-modal="true">
    <div class="hd">
      <h3 id="s-title">Course</h3>
      <button class="btn sm" id="s-close">Close</button>
    </div>
    <div class="bd">
      <div class="rows">
        <div class="lesson">
          <div class="thumb" id="s-thumb">Preview</div>
          <p class="meta" id="s-desc" style="margin-top:8px"></p>
          <div class="toolbar" style="margin-top:10px">
            <button class="btn grad" id="s-primary">Start</button>
            <button class="btn" id="s-outline">Outline</button>
            <button class="btn" id="s-syllabus">Download Syllabus</button>
          </div>
        </div>
        <div class="lesson">
          <h3>Outline</h3>
          <div id="s-outline-list" class="rows" style="margin-top:8px"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Keep About-page navbar / gradient -->
  <script type="module">
    import { bootLayout } from '/assets/js/layout.js';
    bootLayout('about');
  </script>

  <script>
    /* ---------- Data (simple + demo) ---------- */
    const demoCourse = {
      id:'demo',
      title:'Intreen Onboarding (Demo)',
      lessons:4, duration:25, progress:0, thumb:'Onboarding',
      outline:[
        'Welcome to Intreen', 'Using the Dashboard', 'Staying Secure', 'Final Quiz'
      ],
      quiz:[
        {q:'What does MFA stand for?', a:['Multi-Factor Authentication','Mail Forwarding Agent','Micro Frontend Architecture'], correct:0},
        {q:'Where do you find assigned items?', a:['Resources','Dashboard','Profile'], correct:1}
      ]
    };
    let courses = [
      { id:'scrum', title:'Scrum Fundamentals', lessons:6, duration:45, progress:30, thumb:'Scrum' },
      { id:'security', title:'Security Awareness', lessons:8, duration:60, progress:15, thumb:'Security' },
      { id:'tools', title:'Team Tools 101', lessons:5, duration:35, progress:0, thumb:'Tools' },
      demoCourse
    ];
    let assessments = [
      { course:'scrum', name:'Sprint Quiz', score:88, status:'Passed' },
      { course:'security', name:'Phishing Simulation', score:72, status:'Passed' }
    ];
    const upcoming = [
      { date:'Oct 28', title:'Scrum Quiz', tag:'Quiz' },
      { date:'Nov 02', title:'Tools Workshop', tag:'Workshop' }
    ];

    /* ---------- Helpers ---------- */
    const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
    const pct=v=>Math.max(0,Math.min(100,v|0));
    function ci(id){return courses.find(c=>c.id===id);}

    /* ---------- Render ---------- */
    function ringTo(percent){
      const C=2*Math.PI*52, off=C*(1-percent/100);
      const r=$('#ring'), t=$('#ringtxt');
      r.setAttribute('stroke-dasharray',C);
      r.setAttribute('stroke-dashoffset',off);
      t.textContent=percent+'%';
    }

    function renderDashboard(){
      const overall = Math.round(courses.reduce((a,c)=>a+(c.progress||0),0)/courses.length);
      ringTo(overall);
      $('#kpi-courses').textContent = courses.length;
      $('#kpi-certs').textContent = courses.filter(c=>c.progress===100).length;
      $('#kpi-streak').textContent = '3 days';

      // continue (show 2 cards)
      const cont = courses.slice().sort((a,b)=>b.progress-a.progress).slice(0,2);
      $('#continue').innerHTML = cont.map(card).join('');

      // upcoming
      $('#upcoming').innerHTML = upcoming.map(u =>
        `<div class="toolbar" style="justify-content:space-between">
          <div>${u.date} — ${u.title}</div><span class="pill">${u.tag}</span>
        </div>`).join('');
    }

    function card(c){
      return `<article class="card"><div class="p">
        <div class="thumb">${c.thumb}</div>
        <div class="toolbar" style="justify-content:space-between;margin-top:8px">
          <div>
            <div style="font-weight:800">${c.title}</div>
            <div class="meta">${c.lessons} lessons • ${c.duration} min</div>
          </div>
          <button class="btn grad sm" data-resume="${c.id}">${c.progress>0?'Resume':'Start'}</button>
        </div>
        <div class="progress" style="margin-top:8px"><div class="fill" style="width:${pct(c.progress)}%"></div></div>
        <div class="toolbar" style="margin-top:8px">
          <button class="btn sm" data-details="${c.id}">Details</button>
          <button class="btn sm" data-grades="${c.id}">Grades</button>
        </div>
      </div></article>`;
    }

    function renderCoursesView(){
      const q = ($('#q').value||'').toLowerCase();
      const sort = $('#sort').value;
      let list = courses.filter(c => c.title.toLowerCase().includes(q));
      if(sort==='prog') list.sort((a,b)=>b.progress-a.progress);
      if(sort==='dur') list.sort((a,b)=>a.duration-b.duration);
      $('#courses-grid').innerHTML = list.map(card).join('') || '<p class="meta">No courses.</p>';
    }

    function renderGrades(){
      const rows = assessments.map(a=>{
        const c = ci(a.course);
        return `<tr><td>${c?.title||a.course}</td><td>${a.name}</td><td>${a.score ?? '—'}</td><td>${a.status}</td></tr>`;
      }).join('');
      $('#grades-tbody').innerHTML = rows || `<tr><td colspan="4" class="meta">No grades yet.</td></tr>`;
    }

    function renderCerts(){
      $('#certs-list').innerHTML = courses.map(c =>
        `<div class="toolbar" style="justify-content:space-between">
          <div>${c.title}</div>
          ${c.progress===100 ? `<button class="btn sm" data-cert="${c.id}">Download</button>` : `<span class="pill">Pending</span>`}
        </div>`).join('');
    }

    /* ---------- Course Sheet ---------- */
    function openCourse(id){
      const c = ci(id); if(!c) return;
      $('#s-title').textContent = c.title;
      $('#s-thumb').textContent = c.thumb;
      $('#s-desc').textContent = `${c.lessons} lessons • ${c.duration} min`;
      $('#s-primary').textContent = c.progress>0 ? 'Resume' : 'Start';
      $('#s-primary').dataset.resume = c.id;
      $('#sheet-course').classList.add('open');
      $('#s-outline-list').innerHTML = (c.outline||[]).map((t,i)=>
        `<div class="toolbar" style="justify-content:space-between">
          <div>Lesson ${i+1}: ${t}</div><span class="pill">${i+1}</span>
        </div>`).join('');
    }
    function closeCourse(){ $('#sheet-course').classList.remove('open'); }

    /* ---------- Demo play ---------- */
    function play(id){
      const c = ci(id);
      if(!c) return;
      if(id!=='demo'){
        c.progress = Math.min(100,(c.progress||0)+10);
        drawAll(); return;
      }
      // very small inline quiz flow via alerts (keeps UI simple)
      alert('Demo Course: step through quick info…');
      const a1 = prompt('Quiz Q1: MFA stands for? (a/b/c)\na) Multi-Factor Authentication\nb) Mail Forwarding Agent\nc) Micro Frontend Architecture');
      const a2 = prompt('Quiz Q2: Assigned items are found where? (a/b/c)\na) Resources\nb) Dashboard\nc) Profile');
      const correct = (a1||'').toLowerCase()==='a' && (a2||'').toLowerCase()==='b';
      if(correct){
        c.progress = 100;
        assessments.unshift({course:'demo', name:'Demo Quiz', score:100, status:'Passed'});
        // text certificate download
        const blob = new Blob([`Intreen Certificate\nCourse: ${c.title}\nIssued: ${new Date().toLocaleString()}\nStatus: Completed`],{type:'text/plain'});
        const url = URL.createObjectURL(blob); const a = document.createElement('a');
        a.href=url; a.download=`${c.title}-certificate.txt`; a.click(); URL.revokeObjectURL(url);
        alert('Congrats! Certificate downloaded.');
      }else{
        assessments.unshift({course:'demo', name:'Demo Quiz', score:50, status:'Retake'});
        alert('Not quite—marked as Retake.');
      }
      drawAll();
    }

    /* ---------- Views ---------- */
    function show(name){
      $$('#views > section').forEach(s=> s.style.display = (s.dataset.view===name ? '' : 'none'));
      $$('.nav a').forEach(a=> a.classList.toggle('active', a.dataset.view===name));
      if(name==='courses') renderCoursesView();
    }

    /* ---------- Events ---------- */
    function bind(){
      // sidebar
      $$('.nav a').forEach(a=> a.addEventListener('click', ()=> show(a.dataset.view)));
      $('[data-nav="courses"]')?.addEventListener('click', ()=> show('courses'));

      // search
      $('#search').addEventListener('click', ()=>{ show('courses'); renderCoursesView(); });
      $('#q').addEventListener('keydown', e=>{ if(e.key==='Enter'){ show('courses'); renderCoursesView(); }});
      $('#sort').addEventListener('change', renderCoursesView);
      $('#clear').addEventListener('click', ()=>{ $('#q').value=''; $('#sort').value='rec'; renderCoursesView(); });

      // delegation
      document.body.addEventListener('click', e=>{
        const el = e.target.closest('button'); if(!el) return;
        if(el.dataset.details){ openCourse(el.dataset.details); }
        if(el.dataset.resume){ play(el.dataset.resume); }
        if(el.dataset.grades){ show('grades'); }
        if(el.dataset.cert){ // download cert if completed
          const c = ci(el.dataset.cert); if(!c || c.progress<100) return;
          const blob = new Blob([`Intreen Certificate\nCourse: ${c.title}\nIssued: ${new Date().toLocaleString()}\nStatus: Completed`],{type:'text/plain'});
          const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download=`${c.title}-certificate.txt`; a.click(); URL.revokeObjectURL(url);
        }
      });

      // sheet controls
      $('#s-close').addEventListener('click', closeCourse);
      $('#s-outline').addEventListener('click', ()=> alert('Outline shown above.'));
      $('#s-syllabus').addEventListener('click', ()=> alert('Syllabus download (demo).'));
    }

    function drawAll(){
      renderDashboard();
      renderCoursesView();
      renderGrades();
      renderCerts();
    }

    function run(){ bind(); drawAll(); show('dashboard'); }
    run();
  </script>
</body>
</html>
