<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Intreen LMS — E-Learning</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
<link rel="stylesheet" href="/assets/css/gradient-theme.css"/>
<script src="/assets/js/gate.js" defer></script>

<style>
  :root{
    --g1:#007cf0; --g2:#6a00f4;
    --ink:#111; --muted:#556; --line:rgba(0,0,0,.08);
    --glass:rgba(255,255,255,.16); --card:#ffffffee; --chip:#f1f5f9;
  }
  html,body{min-height:100%}
  body{color:var(--ink)}
  .container.page{isolation:isolate}

  .glass{background:var(--glass); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.25); border-radius:18px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; position:relative; z-index:0;}
  .btn-grad{display:inline-block; padding:10px 14px; border-radius:12px; color:#fff; text-decoration:none;
    background:linear-gradient(90deg,var(--g1),var(--g2));}
  .btn-grad.sm{padding:8px 12px}
  .btn-chip{display:inline-block; padding:6px 10px; border-radius:10px; background:var(--chip); color:var(--ink); text-decoration:none; font-size:.92rem}
  .pill{border-radius:9999px; padding:2px 8px; font-size:.8rem; background:#eef2ff; color:#3730a3; display:inline-block}
  .muted{opacity:.75}
  .grid{display:grid; gap:14px}
  .grid-3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
  .columns{display:grid; grid-template-columns:1.2fr 2fr 1fr; gap:14px}
  @media (max-width:1200px){ .columns{grid-template-columns:1fr} }
  .rows{display:grid; gap:8px}
  .row{display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; padding:8px 10px; border-radius:10px; border:1px solid var(--line); background:#fff}
  .progress{height:12px; border-radius:10px; background:#f1f5f9; overflow:hidden}
  .fill{height:100%; background:linear-gradient(90deg,var(--g1),var(--g2))}
  .avatar{width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,var(--g2),var(--g1)); display:inline-block}
  .thumb{border-top-left-radius:12px; border-top-right-radius:12px; width:100%; aspect-ratio:16/9; display:grid; place-items:center; color:#fff; font-weight:800;
    background:linear-gradient(135deg,var(--g1),var(--g2))}
  .kpi{font-weight:800; font-size:1.2rem}
  .tabs{display:flex; gap:8px; flex-wrap:wrap}
  .tab{padding:8px 12px; border-radius:12px; color:#fff; text-decoration:none; opacity:.85; border:1px solid rgba(255,255,255,.25)}
  .tab.active{background:linear-gradient(90deg,var(--g1),var(--g2)); opacity:1; border:none}
  .section-title{color:#fff; margin:0 0 8px}

  header.site{background:transparent; box-shadow:none; border-bottom:none}
  header .container{
    display:flex; align-items:center; gap:10px; padding:10px 0;
    justify-content:flex-start;
  }

  .drawer{display:none; border-top-left-radius:0; border-top-right-radius:0}
  .drawer.open{display:block; animation:draw .18s ease}
  @keyframes draw{from{opacity:0; transform:translateY(-4px)} to{opacity:1; transform:none}}

  .faq-item{border:1px solid var(--line); border-radius:10px; background:#fff}
  .faq-q{cursor:pointer; padding:10px 12px; font-weight:700}
  .faq-a{display:none; padding:0 12px 12px}
  .faq-item.open .faq-a{display:block}

  section, .card, .glass{overflow:visible}

  .cal{display:grid; grid-template-columns:repeat(7,1fr); border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#fff}
  .cal .hd{grid-column:1 / -1; background:#f8fafc; padding:8px 10px; font-weight:700; border-bottom:1px solid var(--line); display:flex; justify-content:space-between}
  .cal .d{min-height:72px; padding:10px; border-right:1px solid rgba(0,0,0,.06); border-bottom:1px solid rgba(0,0,0,.06)}
  .cal .d:nth-child(7n){border-right:none}
  .cal .badge{display:inline-block; margin-top:6px; background:linear-gradient(90deg,var(--g1),var(--g2)); color:#fff; border-radius:8px; padding:2px 6px; font-size:.75rem}

  .mini-list .row{grid-template-columns: auto 1fr auto}
</style>
</head>

<body>
  <div id="site-navbar"></div>

  <!-- Header -->
  <header class="site">
    <nav class="container">
      <a class="brand logo" href="/" aria-label="Back to Home"></a>
    </nav>
  </header>

  <main class="container page" style="padding:24px 16px;">
    <!-- HERO -->
    <section class="glass" style="padding:18px;">
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <img src="/assets/img/main-logo.webp" alt="Intreen" class="lms-logo" style="max-width:180px;height:auto;">
        <span class="pill">Beta</span>
        <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
          <span class="avatar" title="You"></span>
          <span style="color:#fff; opacity:.9; font-weight:600;">Gage</span>
        </div>
      </div>
      <p style="color:#f8fafc; margin:6px 0 0;">A modern, familiar learning experience — courses, tracks, progress, assessments, credentials, and more — all inside Intreen.</p>

      <!-- Search + filters -->
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;">
        <form action="#" method="get" style="display:flex; gap:8px; flex-wrap:wrap;">
          <input type="search" name="q" placeholder="Search courses, tracks, or instructors…" aria-label="Search courses"
                 style="padding:10px 12px; border-radius:12px; border:1px solid rgba(0,0,0,.15); min-width:260px;">
          <select aria-label="Filter by track" style="padding:10px 12px; border-radius:12px; border:1px solid rgba(0,0,0,.15);">
            <option selected>All Tracks</option><option>Onboarding</option><option>Security</option><option>Team Tools</option>
          </select>
          <select aria-label="Sort" style="padding:10px 12px; border-radius:12px; border:1px solid rgba(0,0,0,.15);">
            <option selected>Sort: Recommended</option><option>Newest</option><option>Progress</option><option>Duration</option>
          </select>
          <button class="btn-grad sm" type="submit">Search</button>
        </form>
      </div>

      <!-- Tabs -->
      <div class="tabs" style="margin-top:10px;">
        <a class="tab active" href="#my-courses">My Courses</a>
        <a class="tab" href="#tracks">Tracks</a>
        <a class="tab" href="#catalog">Catalog</a>
        <a class="tab" href="#leaderboard">Leaderboard</a>
        <a class="tab" href="#calendar">Calendar</a>
        <a class="tab" href="#announcements">Announcements</a>
        <a class="tab" href="#instructors">Instructors</a>
        <a class="tab" href="#support">Support</a>
      </div>
    </section>

    <!-- rest of page unchanged -->
    <!-- DASHBOARD COLUMNS, CERTIFICATES, FAQ, etc. -->
  </main>

  <script>
    const drawer = document.getElementById('course-drawer');
    const title = document.getElementById('drawer-title');
    const thumb = document.getElementById('drawer-thumb');
    const desc = document.getElementById('drawer-desc');
    const primary = document.getElementById('drawer-primary');
    const outline = document.getElementById('drawer-outline');
    const syllabus = document.getElementById('drawer-syllabus');

    function openDrawer(name){
      if(!drawer) return;
      title.textContent = name + " — Details";
      thumb.textContent = name;
      desc.textContent = name + " overview, objectives, and lesson outline.";
      primary.textContent = (/start/i.test(primary.textContent) || /resume/i.test(primary.textContent)) ? primary.textContent : "Start";
      drawer.classList.add('open');
      drawer.scrollIntoView({behavior:'smooth', block:'start'});
    }
    document.querySelectorAll('[data-course]').forEach(a=>{
      a.addEventListener('click', e=>{ e.preventDefault(); openDrawer(a.getAttribute('data-course')); });
    });
    document.getElementById('drawer-close')?.addEventListener('click', ()=> drawer.classList.remove('open'));
    outline?.addEventListener('click', e=>{ e.preventDefault(); alert('Outline would open here.'); });
    syllabus?.addEventListener('click', e=>{ e.preventDefault(); alert('Syllabus download placeholder.'); });
    document.querySelectorAll('.faq-item').forEach(i=>{
      i.querySelector('.faq-q')?.addEventListener('click', ()=> i.classList.toggle('open'));
    });
  </script>

  <script type="module">
    import { bootLayout } from '/assets/js/layout.js';
    import { mountCartUI, addToCart } from '/assets/js/cart.js';
    bootLayout('home'); mountCartUI();
    document.body.addEventListener('click', (e)=>{
      const btn = e.target.closest('[data-buy]'); if(!btn) return;
      addToCart({id:btn.dataset.id, title:btn.dataset.title, price:parseFloat(btn.dataset.price)});
    });
  </script>
</body>
</html>
